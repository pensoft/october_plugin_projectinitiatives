<div data-control="toolbar">
    <a href="<?= Backend::url('pensoft/projectinitiatives/data/create') ?>"
        class="btn btn-primary oc-icon-plus">
        New Data
    </a>
    <button
        class="btn btn-success oc-icon-check"
        disabled="disabled"
        onclick="$(this).data('request-data', {
            checked: $('.control-list').listWidget('getChecked')
        })"
        data-request="onActivate"
        data-request-confirm="Activate selected initiatives?"
        data-trigger-action="enable"
        data-trigger=".control-list input[type=checkbox]"
        data-trigger-condition="checked"
        data-request-success="$(this).prop('disabled', true); location.reload()"
        data-stripe-load-indicator>
        Activate selected
    </button>
    <button
        class="btn btn-warning oc-icon-ban"
        disabled="disabled"
        onclick="$(this).data('request-data', {
            checked: $('.control-list').listWidget('getChecked')
        })"
        data-request="onDeactivate"
        data-request-confirm="Deactivate selected initiatives?"
        data-trigger-action="enable"
        data-trigger=".control-list input[type=checkbox]"
        data-trigger-condition="checked"
        data-request-success="$(this).prop('disabled', true); location.reload()"
        data-stripe-load-indicator>
        Deactivate selected
    </button>
    <button
        class="btn btn-danger oc-icon-trash-o"
        disabled="disabled"
        onclick="$(this).data('request-data', {
            checked: $('.control-list').listWidget('getChecked')
        })"
        data-request="onDelete"
        data-request-confirm="Are you sure?"
        data-trigger-action="enable"
        data-trigger=".control-list input[type=checkbox]"
        data-trigger-condition="checked"
        data-request-success="$(this).prop('disabled', true)"
        data-stripe-load-indicator>
        Delete selected
    </button>
</div>
